    <path d="M 10 180 Q 55 160 100 180 T 190 180" fill="none" stroke="#0097A7" stroke-width="8" stroke-linecap="round"/>
    <path d="M 0 200 Q 45 180 90 200 T 180 200" fill="none" stroke="#4DD0E1" stroke-width="8" stroke-linecap="round"/>
